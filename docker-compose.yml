services: 

  db: 
    image: mysql:8
    container_name: mym_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: formmym
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: mym_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "mysql://root:root@db:3306/formmym"
      PORT: 3001
    depends_on:
      - db
  
  frontend: 
    build: ./frontend
    container_name: mym_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_API_URL: http://backend:3001
      BACKEND_INTERNAL_URL: http://backend:3001
    depends_on:
      - backend

volumes:
  db_data:
