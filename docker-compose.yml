services: 

  db: 
    image: mysql:8
    container_name: mym_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: formmym
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: mym_backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    depends_on:
      - db
  
  frontend: 
    build: ./frontend
    container_name: mym_frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  db_data:
